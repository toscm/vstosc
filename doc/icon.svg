<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- dark rounded-square background -->
  <rect x="0" y="0" width="128" height="128" rx="16" fill="#1E1E1E"/>
  <!-- circle: dark ring + blue fill (current blue) -->
  <circle cx="64" cy="64" r="54" fill="#2C2C2C"/>
  <circle cx="64" cy="64" r="48" fill="#2563EB"/>
  <!-- white horizontal lens band (tips touch the blue circle) -->
  <ellipse cx="64" cy="64" rx="48" ry="20" fill="#FFFFFF"/>
  <!-- bold black wordmark -->
  <text x="64" y="64" fill="#111111"
        font-family="'DejaVu Sans', 'Arial', sans-serif" font-weight="700"
        font-size="24" text-anchor="middle" dominant-baseline="central">vstosc</text>
</svg>
